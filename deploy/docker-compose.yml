version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - IPC_SQLITE_PATH=/app/data/ipc_perfcalc.db
    volumes:
      - ./ipc_perfcalc.db:/app/data/ipc_perfcalc.db
      - db-data:/app/data
    ports:
      - "3154:3154"
    restart: unless-stopped

volumes:
  db-data:
